<!--index.html-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Select Role</title>

    <!-- Favicon -->
    <link rel="icon" href="../assets/images/logo/Logo.png">

    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/index.css">
    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- Scripts -->
    <script src="../js/util.js" defer></script>
    <script src="../js/render.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/footer.js" defer></script>
</head>

<body>

    <!-- Main Container -->
    <div class="container">
        <div class="wrapper">

            <!-- Header -->
            <div id="header"></div>

            <!-- Main Content -->
            <main class="main-content">
                <h1>Select Your Role</h1>

                <div class="role-buttons">
                    <button id="adminLogin">Admin</button>
                    <button id="doctorLogin">Doctor</button>
                    <button id="patientLogin" onclick="selectRole('patient')">Patient</button>
                </div>
            </main>

            <!-- Footer -->
            <div id="footer"></div>

        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span id="closeModal"class="close">&times;</span>
            <div id="modal-body">
                <!-- Dynamic content (login forms etc.) -->
            </div>
        </div>
    </div>

    <!-- Page Logic -->
    <script type="module" src="../js/services/index.js"></script>

</body>
</html>
