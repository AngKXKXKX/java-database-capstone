name: Lint Backend Java

on: [push, pull_request]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    name: Lint Java with Checkstyle
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Checkstyle
        run: |
          curl -L -o checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.0/checkstyle-10.12.0-all.jar

      - name: Download Google Checks config
        run: |
          curl -L -o google_checks.xml https://raw.githubusercontent.com/checkstyle/checkstyle/master/src/main/resources/google_checks.xml

      - name: Run Checkstyle
        run: |
          java -jar checkstyle.jar -c google_checks.xml app/src/main/java/com/project/back_end || true